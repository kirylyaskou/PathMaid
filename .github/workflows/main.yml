name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --bundles msi,nsis
          - os: ubuntu-22.04
            args: --bundles deb,appimage
          - os: macos-latest
            args: --bundles dmg,app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: pathmaid ${{ github.ref_name }}
          args: ${{ matrix.args }}
          releaseBody: |
            ## Downloads

            Platform binaries are listed under **Assets** below:

            - `PathMaid_*_x64-setup.exe` / `PathMaid_*_x64_en-US.msi` — Windows
            - `PathMaid_*_aarch64.dmg` — macOS (Apple Silicon, manual install only — auto-update disabled on macOS until notarization is configured)
            - `PathMaid_*_amd64.AppImage` / `PathMaid_*_amd64.deb` — Linux

            ## Auto-update

            Starting from **v1.5.0**, PathMaid updates itself automatically on Windows and Linux. If you're on **v1.4.1 or earlier**, you'll need to download and install this version manually **one last time** — all future updates will be delivered through the app's built-in updater.

            Installer signatures (`.sig`) are attached alongside each installer — the updater verifies them cryptographically before applying an update.

            > `Source code (zip)` and `Source code (tar.gz)` are GitHub's auto-generated tarballs from the git tag — **not the intended downloads**. Use a platform binary above.
          releaseDraft: true
          updaterJsonPreferNsis: true
